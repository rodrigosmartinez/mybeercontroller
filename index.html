<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MyBeerController - Firebase</title>
    <!-- Incluindo o SDK do Firebase via CDN -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://www.gstatic.com/charts/loader.js"></script>

    <style>
        /* Mantenha todo o seu CSS original aqui */
        body { font-family: Arial; background: #111; color: white; text-align: center; }
        .container { width: 1000px; margin: auto; }
        .cards { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .card { background: #222; padding: 15px; border-radius: 10px; width: 150px; }
        .card div:first-child { font-size: 12px; color: #bbb; }
        .value { font-size: 18px; font-weight: bold; }
        #chart_div { height: 400px; background: #fff; border-radius: 15px; margin-bottom: 80px; overflow: hidden; }
        .info-section { display: flex; align-items: flex-start; justify-content: center; gap: 30px; margin-top: 20px; color: white; }
        .info-section img { width: 700px; border-radius: 10px; }
        .info-text { max-width: 400px; text-align: justify; }
        #footer { margin-top: 30px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

    <h1>🍺 MyBeerController</h1>
    
    <div class="container">
        <!-- CARDS -->
        <div class="cards">
            <div class="card"><div>Status</div><div id="status_control" class="value">--</div></div>
            <div class="card"><div>Setpoint</div><div id="setpoint" class="value">--</div></div>
            <div class="card"><div>Temp. Interna</div><div id="temp_in" class="value">--</div></div>
            <div class="card"><div>Temp. Externa</div><div id="temp_out" class="value">--</div></div>
            <div class="card"><div>Histerese</div><div id="hysterese" class="value">--</div></div>
            <div class="card"><div>Delay</div><div id="timedelay" class="value">--</div></div>
            <div class="card"><div>On Time</div><div id="ontime" class="value">--</div></div>
            <div class="card"><div>Off Time</div><div id="offtime" class="value">--</div></div>
        </div>

        <div id="chart_div"></div>

        <div class="info-section">
            <img src="http://mybeercontroller.rf.gd/cat.jpg" alt="MyBeerController">
            <div class="info-text">
                <h1 style="text-align: center;">Controle de Fermentação</h1>
                <p>Dados coletados via ESP8266 e Arduino Mega, armazenados no <b>Firebase Realtime Database</b>.</p>
            </div>
        </div>
    </div>

<script>
    // 1. CONFIGURAÇÃO DO FIREBASE (Copie do seu console)
    const firebaseConfig = {
      apiKey: "AIzaSyBcqFW9oxAxYNfzPpy01UC7XcCZi4rZR1Q",
      authDomain: "meuprojetoiot-c9370.firebaseapp.com",
      databaseURL: "https://meuprojetoiot-c9370-default-rtdb.firebaseio.com",
      projectId: "meuprojetoiot-c9370",
      storageBucket: "meuprojetoiot-c9370.firebasestorage.app",
      messagingSenderId: "281502844111",
      appId: "1:281502844111:web:d7e869de6c6ab007d863ba"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    google.charts.load('current', {packages: ['corechart', 'line']});
    google.charts.setOnLoadCallback(iniciarMonitoramento);

    function iniciarMonitoramento() {
        db.ref('historico').limitToLast(50).on('value', snapshot => {
            const data = snapshot.val();
            if (!data) return;
    
            // Transforma o objeto do Firebase em uma lista
            const keys = Object.keys(data);
            const historyArray = keys.map(key => data[key]);
    
            // Pega o ÚLTIMO registro para os cards
            const lastEntry = data[keys[keys.length - 1]];
            
            atualizarCards(lastEntry); // Passa o objeto completo
            drawChart(historyArray);
        });
    }

    function atualizarCards(last) {
        const format1 = (v) => (v !== undefined && v !== null) ? parseFloat(v).toFixed(1) : "--";
        const format0 = (v) => (v !== undefined && v !== null) ? parseFloat(v).toFixed(0) : "--";
        
        // Status com cores automáticas
        let status = last.status_control == 1 ? "REFRIGERANDO" : "STANDBY";
        let el = document.getElementById("status_control");
        el.innerText = status;
        el.style.color = (status === "REFRIGERANDO") ? "#00bfff" : "#ccc";
    
        // Preenchimento dos cards usando as chaves exatas do seu Firebase
        document.getElementById("setpoint").innerText = format1(last.setpoint) + " °C";
        document.getElementById("temp_in").innerText = format1(last.temperature_in) + " °C";
        document.getElementById("temp_out").innerText = format1(last.temperature_out) + " °C";
        document.getElementById("hysterese").innerText = format1(last.hysterese) + " °C";
        document.getElementById("timedelay").innerText = format0(last.timedelay) + " s";
        document.getElementById("ontime").innerText = format0(last.ontime) + " s";
        document.getElementById("offtime").innerText = format0(last.offtime) + " s";
    }

    function drawChart(rows) {
        var data = new google.visualization.DataTable();
        data.addColumn('string', 'Hora');
        data.addColumn('number', 'Setpoint');
        data.addColumn('number', 'Temp Interna');
        data.addColumn('number', 'Temp Externa');
        data.addColumn('number', 'Limite Sup');
        data.addColumn('number', 'Limite Inf');

        let newRows = rows.map(r => {
            let setpoint = r[3];
            let hyst = r[4];
            return [r[0], r[2], r[1], setpoint, setpoint + (hyst/2), setpoint - (hyst/2)];
        });

        data.addRows(newRows);

        var options = {
            backgroundColor: '#fff',
            curveType: 'function',
            legend: { position: 'bottom' },
            series: {
                0: { color: '#2ecc71' }, // setpoint
                1: { color: '#e74c3c' }, // interna
                2: { color: '#3498db' }, // externa
                3: { lineDashStyle: [4, 4], color: '#999' },
                4: { lineDashStyle: [4, 4], color: '#999' }
            }
        };

        var chart = new google.visualization.LineChart(document.getElementById('chart_div'));
        chart.draw(data, options);
    }
</script>
</body>
</html>
