<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MyBeerController - Firebase</title>

    <script src="https://www.gstatic.com/charts/loader.js"></script>

    <style>
        body { font-family: Arial; background: #111; color: white; text-align: center; }
        .container { width: 1000px; margin: auto; }
        .cards { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .card { background: #222; padding: 15px; border-radius: 10px; width: 150px; }
        .card div:first-child { font-size: 12px; color: #bbb; }
        .value { font-size: 18px; font-weight: bold; }

        .input-card {
            width: 90%;
            text-align: center;
            background: #333;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px;
            font-size: 16px;
        }

        #chart_div { height: 400px; background: #fff; border-radius: 15px; margin-bottom: 80px; overflow: hidden; }

        .info-section { display: flex; align-items: flex-start; justify-content: center; gap: 30px; margin-top: 20px; color: white; }
        .info-section img { width: 700px; border-radius: 10px; }
        .info-text { max-width: 400px; text-align: justify; }

        #footer { margin-top: 30px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

<h1>🍺 MyBeerController - Firebase</h1>

<div class="container">

    <!-- CARDS -->
    <div class="cards">
        <div class="card"><div>Status</div><div id="status_control" class="value">--</div></div>

        <div class="card"><div>Setpoint</div>
            <input id="setpoint" class="input-card">
        </div>

        <div class="card"><div>Temp. Interna</div><div id="temp_in" class="value">--</div></div>

        <div class="card"><div>Temp. Externa</div><div id="temp_out" class="value">--</div></div>

        <div class="card"><div>Histerese</div>
            <input id="hysterese" class="input-card">
        </div>

        <div class="card"><div>Delay</div>
            <input id="timedelay" class="input-card">
        </div>

        <div class="card"><div>On Time</div>
            <input id="ontime" class="input-card">
        </div>

        <div class="card"><div>Off Time</div>
            <input id="offtime" class="input-card">
        </div>
    </div>

    <button onclick="enviarParametros()" style="padding:10px 20px; font-size:16px;">
        Enviar
    </button>

    <div id="chart_div"></div>

    <div class="info-section">
        <img src="http://mybeercontroller.rf.gd/cat.jpg">
        <div class="info-text">
            <h2>Controle de fermentação</h2>
            <p>
                Sistema baseado em Arduino com envio de dados para o Firebase,
                permitindo monitoramento remoto em tempo real.
            </p>
        </div>
    </div>

    <div id="footer">
        MyBeerController © 2026
    </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBcqFW9oxAxYNfzPpy01UC7XcCZi4rZR1Q",
  authDomain: "meuprojetoiot-c9370.firebaseapp.com",
  databaseURL: "https://meuprojetoiot-c9370-default-rtdb.firebaseio.com",
  projectId: "meuprojetoiot-c9370"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

google.charts.load('current', {packages: ['corechart', 'line']});
google.charts.setOnLoadCallback(iniciarFirebase);

function iniciarFirebase() {

    db.ref('historico').limitToLast(50).on('value', snapshot => {

        const data = snapshot.val();
        if (!data) return;

        let history = [];
        let keys = Object.keys(data);
        keys.sort();

        for (let k of keys) {
            let item = data[k];

            let date = new Date(item.timestamp || Date.now());
            let hora = date.getHours() + ":" + String(date.getMinutes()).padStart(2, '0');

            history.push([
                hora,
                item.temperature_out,
                item.temperature_in,
                item.setpoint,
                item.hysterese,
                item.status_control,
                item.timedelay,
                item.ontime,
                item.offtime
            ]);
        }

        let last = history[history.length - 1];

        atualizarCards(last);
        drawChart(history);
    });
}

function atualizarCards(last) {

    function f1(v){ return (v !== undefined) ? parseFloat(v).toFixed(1) : ""; }
    function f0(v){ return (v !== undefined) ? parseInt(v) : ""; }

    let status = "STANDBY";
    if (last[5] == 1) status = "REFRIGERANDO";
    else if (last[5] == 0) status = "AQUECENDO";

    let el = document.getElementById("status_control");
    el.innerText = status;

    if (status === "REFRIGERANDO") el.style.color = "#00bfff";
    else if (status === "AQUECENDO") el.style.color = "#ff4d4d";
    else el.style.color = "#ccc";

    document.getElementById("setpoint").value = f1(last[3]);
    document.getElementById("hysterese").value = f1(last[4]);
    document.getElementById("timedelay").value = f0(last[6]);
    document.getElementById("ontime").value = f0(last[7]);
    document.getElementById("offtime").value = f0(last[8]);

    document.getElementById("temp_in").innerText = f1(last[2]) + " °C";
    document.getElementById("temp_out").innerText = f1(last[1]) + " °C";
}

function enviarParametros() {

    const dados = {
        setpoint: parseFloat(document.getElementById("setpoint").value),
        hysterese: parseFloat(document.getElementById("hysterese").value),
        timedelay: parseInt(document.getElementById("timedelay").value),
        ontime: parseInt(document.getElementById("ontime").value),
        offtime: parseInt(document.getElementById("offtime").value),
        timestamp: Date.now()
    };

    console.log("Enviando:", dados);

    firebase.database().ref("comandos").set(dados)
        .then(() => alert("Enviado!"))
        .catch(err => console.error(err));
}

function drawChart(rows) {

    var data = new google.visualization.DataTable();
    data.addColumn('string', 'Hora');
    data.addColumn('number', 'Temp Interna');
    data.addColumn('number', 'Temp Externa');
    data.addColumn('number', 'Setpoint');
    data.addColumn('number', 'Limite Superior');
    data.addColumn('number', 'Limite Inferior');

    let newRows = rows.map(r => {
        let sp = r[3];
        let h = r[4];

        return [r[0], r[2], r[1], sp, sp + (h/2), sp - (h/2)];
    });

    data.addRows(newRows);

    var chart = new google.visualization.LineChart(document.getElementById('chart_div'));
    chart.draw(data, {
        legend: 'right',
        backgroundColor: '#ffffff'
    });
}
</script>

</body>
</html>
