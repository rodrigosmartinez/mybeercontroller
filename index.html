<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug MyBeer</title>

    <!-- 1. BIBLIOTECAS FIREBASE (VERSÃO COMPATIBILIDADE) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    
    <!-- 2. GOOGLE CHARTS -->
    <script src="https://gstatic.com"></script>

    <style>
        body { font-family: Arial, sans-serif; background: #111; color: white; text-align: center; margin: 0; padding: 10px; }
        
        /* CAIXA DE DEBUG (PARA VOCÊ VER O ERRO NO CELULAR) */
        #debug-console {
            background: #330000; border: 1px solid red; color: #ffcccc; 
            padding: 10px; margin-bottom: 20px; font-family: monospace; 
            font-size: 12px; text-align: left; min-height: 100px;
        }

        .cards { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .card { background: #222; padding: 15px; border-radius: 10px; width: 140px; }
        .value { font-size: 18px; font-weight: bold; margin-top: 5px; }
        .label { font-size: 12px; color: #bbb; }
        #chart_div { background: #fff; height: 300px; border-radius: 10px; width: 100%; overflow: hidden; }
    </style>
</head>
<body>

    <!-- ÁREA DE DIAGNÓSTICO -->
    <div id="debug-console">Iniciando diagnóstico...<br></div>

    <h1>🍺 MyBeer Monitor</h1>

    <div class="cards">
        <div class="card"><div class="label">Temp Interna</div><div id="temp_in" class="value">--</div></div>
        <div class="card"><div class="label">Temp Externa</div><div id="temp_out" class="value">--</div></div>
        <div class="card"><div class="label">Status</div><div id="status_control" class="value">--</div></div>
        <div class="card"><div class="label">Última Leitura</div><div id="last_time" class="value">--:--</div></div>
    </div>

    <div id="chart_div"></div>

<script>
    // FUNÇÃO PARA ESCREVER NA TELA PRETA DE DEBUG
    function log(msg) {
        const d = document.getElementById('debug-console');
        d.innerHTML += "> " + msg + "<br>";
        console.log(msg);
    }

    // ==========================================================
    // 1. COLE SUAS CONFIGURAÇÕES AQUI (CUIDADO COM AS ASPAS)
    // ==========================================================
    const firebaseConfig = {
      apiKey: "AIzaSyBcqFW9oxAxYNfzPpy01UC7XcCZi4rZR1Q",
      authDomain: "meuprojetoiot-c9370.firebaseapp.com",
      databaseURL: "https://meuprojetoiot-c9370-default-rtdb.firebaseio.com",
      projectId: "meuprojetoiot-c9370",
      storageBucket: "meuprojetoiot-c9370.firebasestorage.app",
      messagingSenderId: "281502844111",
      appId: "1:281502844111:web:d7e869de6c6ab007d863ba"
    };

    try {
        log("Inicializando Firebase...");
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        log("Firebase iniciado. Conectando ao banco...");

        // Teste de conexão simples antes de carregar o gráfico
        const connectedRef = db.ref(".info/connected");
        connectedRef.on("value", (snap) => {
            if (snap.val() === true) {
                log("✅ CONECTADO AO SERVIDOR FIREBASE!");
            } else {
                log("⏳ Tentando conectar...");
            }
        });

        // Carregamento do Google Charts
        google.charts.load('current', {packages: ['corechart', 'line']});
        google.charts.setOnLoadCallback(iniciarApp);

    } catch (e) {
        log("❌ ERRO FATAL NA INICIALIZAÇÃO: " + e.message);
    }

    function iniciarApp() {
        log("Google Charts carregado. Buscando dados em '/historico'...");
        
        const historicoRef = firebase.database().ref('historico');
        
        // Ouve os dados (limite de 20 para ser rápido)
        historicoRef.limitToLast(20).on('value', (snapshot) => {
            try {
                const data = snapshot.val();
                
                if (!data) {
                    log("⚠️ A pasta 'historico' existe mas está vazia ou nula.");
                    return;
                }

                log("📦 Dados recebidos! Processando...");
                
                const keys = Object.keys(data);
                log("Total de registros encontrados: " + keys.length);

                // Pega o último dado para os cards
                const lastKey = keys[keys.length - 1];
                const last = data[lastKey];
                
                // Atualiza Cards
                document.getElementById("temp_in").innerText = (last.temperature_in ?? 0) + " °C";
                document.getElementById("temp_out").innerText = (last.temperature_out ?? 0) + " °C";
                document.getElementById("status_control").innerText = (last.status_control == 1) ? "LIGADO" : "DESLIGADO";
                
                if(last.timestamp) {
                    let date = new Date(last.timestamp);
                    document.getElementById("last_time").innerText = date.getHours() + ":" + String(date.getMinutes()).padStart(2, '0');
                }

                // Desenha Gráfico
                drawChart(data);
                log("✅ Gráfico e Cards atualizados com sucesso.");

            } catch (innerError) {
                log("❌ ERRO AO PROCESSAR DADOS: " + innerError.message);
            }
        }, (errorObject) => {
            log("❌ FALHA DE PERMISSÃO/LEITURA: " + errorObject.code);
            log("Verifique se as REGRAS do banco estão como true.");
        });
    }

    function drawChart(data) {
        var dataTable = new google.visualization.DataTable();
        dataTable.addColumn('string', 'Hora');
        dataTable.addColumn('number', 'Interna');
        dataTable.addColumn('number', 'Externa');

        const keys = Object.keys(data);
        keys.forEach(k => {
            let d = data[k];
            let hora = "";
            if(d.timestamp) {
                let dt = new Date(d.timestamp);
                hora = dt.getHours() + ":" + String(dt.getMinutes()).padStart(2, '0');
            }
            dataTable.addRow([hora, parseFloat(d.temperature_in), parseFloat(d.temperature_out)]);
        });

        var options = {
            backgroundColor: '#fff',
            legend: { position: 'bottom' },
            chartArea: { width: '85%', height: '70%' }
        };

        var chart = new google.visualization.LineChart(document.getElementById('chart_div'));
        chart.draw(dataTable, options);
    }
</script>

</body>
</html>
            <div class="card"><div>Histerese</div><div id="hysterese" class="value">--</div></div>
            <div class="card"><div>Delay</div><div id="timedelay" class="value">--</div></div>
            <div class="card"><div>On Time</div><div id="ontime" class="value">--</div></div>
            <div class="card"><div>Off Time</div><div id="offtime" class="value">--</div></div>
        </div>

        <div id="chart_div"></div>

        <div class="info-section">
            <img src="http://mybeercontroller.rf.gd/cat.jpg" alt="MyBeerController">
            <div class="info-text">
                <h1 style="text-align: center;">Controle de Fermentação</h1>
                <p>Dados coletados via ESP8266 e Arduino Mega, armazenados no <b>Firebase Realtime Database</b>.</p>
            </div>
        </div>
    </div>

<script>
    // 1. Configuração (COLE SEUS DADOS AQUI)
const firebaseConfig = {
  apiKey: "AIzaSyBcqFW9oxAxYNfzPpy01UC7XcCZi4rZR1Q",
  authDomain: "meuprojetoiot-c9370.firebaseapp.com",
  databaseURL: "https://meuprojetoiot-c9370-default-rtdb.firebaseio.com",
  projectId: "meuprojetoiot-c9370",
  storageBucket: "meuprojetoiot-c9370.firebasestorage.app",
  messagingSenderId: "281502844111",
  appId: "1:281502844111:web:d7e869de6c6ab007d863ba"
};

// Inicialização
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

google.charts.load('current', {packages: ['corechart', 'line']});
google.charts.setOnLoadCallback(() => {
    // Só começa a ler o banco quando o Google Charts estiver pronto
    db.ref('historico').limitToLast(50).on('value', snapshot => {
        const data = snapshot.val();
        if (!data) return;

        const keys = Object.keys(data);
        const lastKey = keys[keys.length - 1];
        const last = data[lastKey];

        // ATUALIZA OS CARDS
        document.getElementById("temp_in").innerText = (last.temperature_in || 0).toFixed(1) + " °C";
        document.getElementById("temp_out").innerText = (last.temperature_out || 0).toFixed(1) + " °C";
        document.getElementById("setpoint").innerText = (last.setpoint || 0).toFixed(1) + " °C";
        document.getElementById("hysterese").innerText = (last.hysterese || 0).toFixed(1) + " °C";
        document.getElementById("status_control").innerText = (last.status_control == 1) ? "LIGADO" : "DESLIGADO";
        document.getElementById("timedelay").innerText = (last.timedelay || 0) + "s";
        document.getElementById("ontime").innerText = (last.ontime || 0) + "s";
        document.getElementById("offtime").innerText = (last.offtime || 0) + "s";

        // DESENHA O GRÁFICO
        var chartData = new google.visualization.DataTable();
        chartData.addColumn('string', 'Hora');
        chartData.addColumn('number', 'Interna');
        chartData.addColumn('number', 'Externa');

        keys.forEach(k => {
            let d = data[k];
            let hora = "";
            if(d.timestamp) {
                let dt = new Date(d.timestamp);
                hora = dt.getHours() + ":" + String(dt.getMinutes()).padStart(2, '0');
            }
            chartData.addRow([hora, d.temperature_in || 0, d.temperature_out || 0]);
        });

        var options = {
            legend: 'bottom',
            curveType: 'function',
            chartArea: { width: '90%', height: '70%' }
        };

        var chart = new google.visualization.LineChart(document.getElementById('chart_div'));
        chart.draw(chartData, options);
    });
});
</script>
</body>
</html>
