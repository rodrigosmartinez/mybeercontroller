<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>MyBeerController</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>
body {
    font-family: Arial;
    background: #0d1117;
    color: white;
    margin: 0;
}

h1 {
    text-align: center;
    margin: 20px 0;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 10px;
}

/* CARDS */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
}

.card {
    background: #161b22;
    padding: 12px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.card-title {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 5px;
}

.value {
    font-size: 18px;
    font-weight: bold;
}

/* INPUT */
input {
    width: 90%;
    padding: 6px;
    border-radius: 6px;
    border: none;
    text-align: center;
    background: #0d1117;
    color: white;
}

/* BOTÃO */
.btn {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    background: #238636;
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 16px;
}

.btn:active {
    background: #2ea043;
}

/* STATUS */
.status {
    font-weight: bold;
}

#chart_div {
    margin-top: 20px;
    height: 350px;
    background: white;
    border-radius: 12px;
}

/* FEEDBACK */
#msg {
    margin-top: 10px;
    text-align: center;
    font-size: 14px;
}
</style>

</head>

<body>

<h1>🍺 MyBeerController</h1>

<div class="container">

<div class="cards">

<div class="card">
<div class="card-title">Status</div>
<div id="status_control" class="value status">--</div>
</div>

<div class="card">
<div class="card-title">Temp. Interna</div>
<div id="temp_in" class="value">--</div>
</div>

<div class="card">
<div class="card-title">Temp. Externa</div>
<div id="temp_out" class="value">--</div>
</div>

<div class="card">
<div class="card-title">Setpoint</div>
<input id="setpoint" type="number" step="0.1">
</div>

<div class="card">
<div class="card-title">Histerese</div>
<input id="hysterese" type="number" step="0.1">
</div>

<div class="card">
<div class="card-title">Delay</div>
<input id="timedelay" type="number">
</div>

<div class="card">
<div class="card-title">On Time</div>
<input id="ontime" type="number">
</div>

<div class="card">
<div class="card-title">Off Time</div>
<input id="offtime" type="number">
</div>

</div>

<button class="btn" onclick="enviarSet()">Enviar Configuração</button>

<div id="msg"></div>

<div id="chart_div"></div>

</div>

<script>

const ESP_IP = "http://SEU_IP_OU_NOIP"; // 🔥 ALTERAR

// 🔄 Atualiza dados
async function atualizar() {
    try {
        const res = await fetch(ESP_IP + "/status");
        const data = await res.json();

        document.getElementById("temp_in").innerText = data.temp_in.toFixed(1) + "°C";
        document.getElementById("temp_out").innerText = data.temp_out.toFixed(1) + "°C";

        document.getElementById("setpoint").value = data.setpoint;
        document.getElementById("hysterese").value = data.hysterese;

        // status simples
        let status = "STANDBY";
        if (data.temp_in > data.setpoint) status = "REFRIGERANDO";
        else if (data.temp_in < data.setpoint) status = "AQUECENDO";

        let el = document.getElementById("status_control");
        el.innerText = status;

        if (status === "REFRIGERANDO") el.style.color = "#00bfff";
        else if (status === "AQUECENDO") el.style.color = "#ff4d4d";
        else el.style.color = "#ccc";

    } catch(e) {
        document.getElementById("msg").innerText = "Erro ao conectar";
    }
}

// 📤 Envia config
async function enviarSet() {

    const url = ESP_IP + "/set?" +
        "setpoint=" + document.getElementById("setpoint").value +
        "&hysterese=" + document.getElementById("hysterese").value +
        "&timedelay=" + document.getElementById("timedelay").value +
        "&ontime=" + document.getElementById("ontime").value +
        "&offtime=" + document.getElementById("offtime").value;

    try {
        await fetch(url);
        document.getElementById("msg").innerText = "✅ Configuração enviada!";
    } catch(e) {
        document.getElementById("msg").innerText = "❌ Erro ao enviar!";
    }
}

// 🔄 auto update
setInterval(atualizar, 3000);
atualizar();

</script>

</body>
</html>
