<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>MyBeerController</title>

<link rel='icon' type='image/png' href='http://mybeercontroller.rf.gd/cat_sunglass.jpg'/>
    
<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

.container {
    width: 1000px;
    margin: auto;
}

.cards {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}
    
.card {
    background: #222;
    padding: 15px;
    border-radius: 10px;
    width: 150px;
}

.card div:first-child {
    font-size: 12px;
    color: #bbb;
}
    
.value {
    font-size: 18px;
    font-weight: bold;
}

#chart_div {
    height: 400px;
    background: #fff;
    border-radius: 15px;
    margin-bottom: 80px;
    overflow: hidden;
}

.info-section {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 30px;
    margin-top: 20px;
    color: white;
}

.info-section img {
    width: 700px;
    border-radius: 10px;
}

.info-text {
    max-width: 400px;
    text-align: justify;
}

#footer {
    margin-top: 30px;
    font-size: 12px;
    color: #aaa;
}
</style>

</head>
<body>

<h1>🍺 MyBeerController</h1>
    
<div class="container">

<div class="cards">
    <div class="card"><div>Status</div><div id="status_control" class="value">--</div></div>
    <div class="card"><div>Setpoint</div><div id="setpoint" class="value">--</div></div>
    <div class="card"><div>Temp. Interna</div><div id="temp_in" class="value">--</div></div>
    <div class="card"><div>Temp. Externa</div><div id="temp_out" class="value">--</div></div>
    <div class="card"><div>Histerese</div><div id="hysterese" class="value">--</div></div>
    <div class="card"><div>Delay</div><div id="timedelay" class="value">--</div></div>
    <div class="card"><div>On Time</div><div id="ontime" class="value">--</div></div>
    <div class="card"><div>Off Time</div><div id="offtime" class="value">--</div></div>
</div>

<div id="chart_div"></div>

<div class="info-section">
    <img src="http://mybeercontroller.rf.gd/cat.jpg">
    <div class="info-text">
        <h1><b>Controle de temperatura de fermentacao!</b></h1>
        <p>
        Dados coletados por Arduino e enviados para nuvem via Wi-Fi.
        Monitoramento remoto em tempo real 🍺
        </p>
    </div>
</div>

<div id="footer">
    MyBeerController © 2026
</div>

</div>

<script>
google.charts.load('current', {packages: ['corechart', 'line']});

function atualizarTudo() {

    fetch("https://mybeercontroller.onrender.com/data")
    .then(res => res.json())
    .then(data => {

        function format1(v){ return (v !== null) ? parseFloat(v).toFixed(1) : "--"; }
        function format0(v){ return (v !== null) ? parseFloat(v).toFixed(0) : "--"; }

        let status = data.last.status_control ?? "--";

        let el = document.getElementById("status_control");
        el.innerText = status;

        if (status === "REFRIGERANDO") el.style.color = "#00bfff";
        else if (status === "AQUECENDO") el.style.color = "#ff4d4d";
        else el.style.color = "#ccc";

        document.getElementById("setpoint").innerText = format1(data.last.setpoint) + " °C";
        document.getElementById("temp_in").innerText = format1(data.last.temperature_in) + " °C";
        document.getElementById("temp_out").innerText = format1(data.last.temperature_out) + " °C";
        document.getElementById("hysterese").innerText = format1(data.last.hysterese) + " °C";
        document.getElementById("timedelay").innerText = format0(data.last.timedelay) + " s";
        document.getElementById("ontime").innerText = format0(data.last.ontime) + " s";
        document.getElementById("offtime").innerText = format0(data.last.offtime) + " s";
        
        drawChart(data.history);
    });
}

function drawChart(rows) {

    var data = new google.visualization.DataTable();
    data.addColumn('string', 'Hora');
    data.addColumn('number', 'Temp Externa');
    data.addColumn('number', 'Temp Interna');
    data.addColumn('number', 'Setpoint');
    data.addColumn('number', 'Limite Superior');
    data.addColumn('number', 'Limite Inferior');

    let hyst = parseFloat(document.getElementById("hysterese").innerText) || 0;

    let newRows = [];

    for (let i = rows.length - 1; i >= 0; i--) {

        let r = rows[i];

        let hora = r.time.substring(0,5);
        let temp_out = parseFloat(r.temperature_out);
        let temp_in = parseFloat(r.temperature_in);
        let setpoint = parseFloat(r.setpoint);

        let lim_sup = setpoint + (hyst / 2);
        let lim_inf = setpoint - (hyst / 2);

        newRows.push([
            hora,
            temp_out,
            temp_in,
            setpoint,
            lim_sup,
            lim_inf
        ]);
    }

    data.addRows(newRows);

    var chart = new google.visualization.LineChart(document.getElementById('chart_div'));
    chart.draw(data, { legend: 'right' });
}

google.charts.setOnLoadCallback(atualizarTudo);
setInterval(atualizarTudo, 3000);
</script>

</body>
</html>
