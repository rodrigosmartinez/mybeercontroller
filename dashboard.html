<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>MyBeerController</title>

<link rel='icon' type='image/png' href='cat_sunglass.jpg'/>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}
.container { width: 1000px; margin: auto; }

.cards {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}

.card {
    background: #222;
    padding: 15px;
    border-radius: 10px;
    width: 150px;
}

.card div:first-child {
    font-size: 12px;
    color: #bbb;
}

.value {
    font-size: 18px;
    font-weight: bold;
}

#chart_div {
    height: 400px;
    background: #fff;
    border-radius: 15px;
    margin-bottom: 80px;
}

</style>
</head>

<body>

<h1>🍺 MyBeerController</h1>

<div class="container">

<div class="cards">
    <div class="card"><div>Status</div><div id="status_control" class="value">--</div></div>
    <div class="card"><div>Setpoint</div><div id="setpoint" class="value">--</div></div>
    <div class="card"><div>Temp. Interna</div><div id="temp_in" class="value">--</div></div>
    <div class="card"><div>Temp. Externa</div><div id="temp_out" class="value">--</div></div>
    <div class="card"><div>Histerese</div><div id="hysterese" class="value">--</div></div>
    <div class="card"><div>Delay</div><div id="timedelay" class="value">--</div></div>
    <div class="card"><div>On Time</div><div id="ontime" class="value">--</div></div>
    <div class="card"><div>Off Time</div><div id="offtime" class="value">--</div></div>
</div>

<div id="chart_div"></div>

</div>

<script>
google.charts.load('current', {packages: ['corechart']});

async function atualizarTudo() {

    try {
        const res = await fetch("/data");
        const json = await res.json();

        const last = json.last;
        const history = json.history;

        function f1(v){ return v ? parseFloat(v).toFixed(1) : "--"; }
        function f0(v){ return v ? parseFloat(v).toFixed(0) : "--"; }

        // STATUS
        let status = last.status_control || "--";
        let el = document.getElementById("status_control");
        el.innerText = status;

        if (status === "REFRIGERANDO") el.style.color = "#00bfff";
        else if (status === "AQUECENDO") el.style.color = "#ff4d4d";
        else el.style.color = "#ccc";

        // CARDS
        document.getElementById("setpoint").innerText = f1(last.setpoint) + " °C";
        document.getElementById("temp_in").innerText = f1(last.temperature_in) + " °C";
        document.getElementById("temp_out").innerText = f1(last.temperature_out) + " °C";
        document.getElementById("hysterese").innerText = f1(last.hysterese) + " °C";
        document.getElementById("timedelay").innerText = f0(last.timedelay) + " s";
        document.getElementById("ontime").innerText = f0(last.ontime) + " s";
        document.getElementById("offtime").innerText = f0(last.offtime) + " s";

        drawChart(history);

    } catch (e) {
        console.log("Erro:", e);
    }
}

function drawChart(rows) {

    let data = new google.visualization.DataTable();

    data.addColumn('string', 'Hora');
    data.addColumn('number', 'Temp Interna');
    data.addColumn('number', 'Temp Externa');
    data.addColumn('number', 'Setpoint');

    let chartRows = [];

    rows.reverse().forEach(r => {

        let hora = r.time;
        let temp_in = parseFloat(r.temperature_in);
        let temp_out = parseFloat(r.temperature_out);
        let setpoint = parseFloat(r.setpoint);

        chartRows.push([hora, temp_in, temp_out, setpoint]);
    });

    data.addRows(chartRows);

    let options = {
        legend: 'right',
        backgroundColor: '#ffffff',
        chartArea:{left:'8%',top:'10%',width:'75%',height:'70%'}
    };

    let chart = new google.visualization.LineChart(document.getElementById('chart_div'));
    chart.draw(data, options);
}

google.charts.setOnLoadCallback(atualizarTudo);
setInterval(atualizarTudo, 5000);
</script>

</body>
</html>
